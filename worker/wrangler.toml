name = "forebay-worker"
main = "build/worker/shim.mjs"
compatibility_date = "2024-01-01"

[build]
command = "cargo install -q worker-build && worker-build --release"

[[kv_namespaces]]
binding = "QUEUES"
id = "a0e9b53e3bcb4da18c13569e1b1d8262"

[vars]
# API Keys in format: "key1:email1@example.com,key2:email2@example.com"
# For development, set in .dev.vars file
# For production, use: wrangler secret put API_KEYS
API_KEYS = "dev-alice:alice@example.com,dev-bob:bob@example.com"
